<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Credit Transfer Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#E8DFF5; --surface:#FFFFFF; --border:#D7D8D8;
    --text:#2D1A4E; --text-dim:#7A6690;
    --navy:#0D2C6C; --teal:#009B9F; --green:#719F4C; --purple:#573393;
    --red:#91040D; --orange:#F26322; --plum:#2F005F;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
         -webkit-font-smoothing:antialiased; }
  a { color:inherit; }
  .jsa-logobar { background:#F3EAFF; border-bottom:2px solid #4B0985; padding:3px 0; line-height:0; }
  .jsa-logobar > div { max-width:1400px; margin:0 auto; padding:0 48px; }
  .jsa-logobar img { display:block; height:56px; }
  .jsa-titlebar { background:var(--plum); padding:14px 36px; }
  .jsa-titlebar > div { max-width:1400px; margin:0 auto; padding:0 36px; }
  .jsa-titlebar .title { color:#fff; font-size:24px; font-weight:700; letter-spacing:2px;
                         text-transform:uppercase; }
  .info-panel { background:var(--navy); border-radius:12px; padding:18px 24px; margin-top:4px; }
  .info-panel p { color:#fff; font-size:15px; line-height:1.7; }
  .info-panel p .lbl { font-weight:700; }
  .container { max-width:1400px; margin:0 auto; padding:20px 36px 48px; }
  .tabs { display:flex; gap:6px; border-bottom:2px solid var(--navy); margin:18px 0 24px; }
  .tab { background:transparent; border:none; padding:12px 26px; font-family:inherit; font-size:14px;
         font-weight:600; color:var(--text-dim); cursor:pointer; border-radius:8px 8px 0 0;
         text-transform:uppercase; letter-spacing:0.04em; }
  .tab.active { background:var(--navy); color:#fff; }
  .tab:not(.active):hover { color:var(--navy); }
  .panel { display:none; }
  .panel.active { display:block; }
  table.courses { width:100%; border-collapse:collapse; background:var(--surface);
                  box-shadow:0 2px 8px rgba(13,44,108,0.06); border-radius:12px; overflow:hidden;
                  border:1px solid #C8B8E0; }
  table.courses thead th { background:var(--navy); color:#fff; text-align:left; padding:14px 18px;
                  font-size:0.8rem; letter-spacing:0.04em; text-transform:uppercase; }
  table.courses tbody td { padding:14px 18px; border-top:1px solid #EFEAF7; }
  table.courses tbody tr { cursor:pointer; transition:background 0.12s; }
  table.courses tbody tr:hover { background:#F5F0FB; }
  .ccode { font-weight:700; color:var(--navy); }
  .cname { color:#4a5568; }
  .badge { display:inline-block; padding:4px 14px; border-radius:4px; color:#fff; font-weight:700;
           font-size:0.78rem; text-transform:capitalize; }
  .score-cell { font-weight:700; }
  .open-hint { color:var(--text-dim); font-size:0.8rem; }
  .detail-empty { color:var(--text-dim); font-size:1rem; padding:60px 0; text-align:center; }
  .d-head { display:flex; align-items:center; justify-content:space-between;
            border-bottom:3px solid var(--navy); padding-bottom:18px; }
  .d-head h2 { color:var(--navy); font-size:1.6rem; }
  .d-head .badge { padding:8px 26px; font-size:1rem; clip-path:polygon(0 0,100% 0,92% 100%,0 100%); }
  .top { display:grid; grid-template-columns:1fr 1fr auto; gap:22px; align-items:start; margin-top:24px; }
  .pnl { border-radius:12px; padding:22px 24px; }
  .pnl-title { font-weight:700; font-size:1.02rem; margin-bottom:14px; }
  .summary { background:linear-gradient(135deg,#5b2a91,var(--plum)); color:#fff; }
  .summary ul { list-style:none; }
  .summary li { padding:7px 0; font-size:0.96rem; border-bottom:1px solid rgba(255,255,255,0.14); }
  .summary li:last-child { border-bottom:none; }
  .units { background:var(--surface); border:1px solid #C8B8E0; }
  .units .pnl-title { color:var(--text); }
  .units ul { list-style:none; }
  .units li { padding:10px 0; border-bottom:1px solid #EFEAF7; font-size:0.93rem; }
  .units li:last-child { border-bottom:none; }
  .ucode { font-weight:700; color:var(--navy); }
  .gauge-wrap { text-align:center; }
  .gauge-score { font-size:20px; font-weight:700; fill:var(--text); }
  .gauge-conf { font-size:13px; fill:var(--text-dim); }
  .matches { margin-top:32px; }
  .matches h3 { background:var(--navy); color:#fff; padding:14px 20px; border-radius:10px 10px 0 0;
                font-size:1.05rem; }
  table.match { width:100%; border-collapse:collapse; background:var(--surface);
                box-shadow:0 2px 8px rgba(13,44,108,0.06); border-radius:0 0 12px 12px; overflow:hidden;
                border:1px solid #C8B8E0; border-top:none; }
  table.match th { text-align:left; padding:12px 16px; color:#4a5568; font-size:0.8rem;
                   text-transform:uppercase; letter-spacing:0.03em; border-bottom:2px solid #EFEAF7; }
  table.match td { padding:12px 16px; border-bottom:1px solid #F3F0F9; font-size:0.93rem; }
  table.match tr:last-child td { border-bottom:none; }
  .arrow { color:var(--text-dim); }
  .bar { display:inline-block; width:150px; height:14px; background:#EDE7F5; border-radius:3px;
         overflow:hidden; vertical-align:middle; margin-right:10px; }
  .bar > span { display:block; height:100%; background:var(--navy); }
  .simval { font-weight:700; }
  .yes { color:var(--green); font-weight:700; }
  .no { color:#cbd5e0; font-weight:700; }
  .center { text-align:center; }
  .disclaimer { color:var(--text-dim); font-size:0.85rem; margin-top:28px; }
  .footnote { color:var(--text-dim); font-size:0.85rem; margin-top:20px; }
</style>
</head>

  partial:     ["Partial", "var(--orange)"],
  none:        ["None", "var(--red)"],
};
// Score color is driven by the recommendation type — same source of
// truth as the label, so the gauge arc and the Score cell can never
// disagree with the Recommendation tag (previous fixed-threshold
// version coloured 0.78 PARTIAL as green because 0.78 ≥ 0.75).
function recColor(recKey){ return (REC[recKey] && REC[recKey][1]) || "#718096"; }
function pct(v){ return (v*100).toFixed(1)+"%"; }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function showTab(name){
  document.getElementById("panel-courses").classList.toggle("active", name==="courses");
  document.getElementById("panel-detail").classList.toggle("active", name==="detail");
  document.getElementById("tab-courses").classList.toggle("active", name==="courses");
  document.getElementById("tab-detail").classList.toggle("active", name==="detail");
  window.scrollTo({top:0, behavior:"smooth"});
}

function gauge(score, conf, recKey){
  const cx=110, cy=110, r=90, frac=Math.max(0,Math.min(1,score));
  const pt=a=>[cx+r*Math.cos(a*Math.PI/180), cy-r*Math.sin(a*Math.PI/180)];
  const [sx,sy]=pt(180), [ex,ey]=pt(0), [vx,vy]=pt(180-180*frac);
  return `<svg viewBox="0 0 220 150" style="width:220px;height:150px">
    <path d="M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 0 1 ${ex.toFixed(1)} ${ey.toFixed(1)}" fill="none" stroke="#E2E0EA" stroke-width="18" stroke-linecap="round"/>
    <path d="M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${r} ${r} 0 0 1 ${vx.toFixed(1)} ${vy.toFixed(1)}" fill="none" stroke="${recColor(recKey)}" stroke-width="18" stroke-linecap="round"/>
    <text x="110" y="100" text-anchor="middle" class="gauge-score">Score: ${score.toFixed(2)}</text>
    <text x="110" y="128" text-anchor="middle" class="gauge-conf">Confidence: ${Math.round(conf*100)}%</text>
  </svg>`;
}
function check(ok){ return ok ? '<span class="yes">&#10003;</span>' : '<span class="no">&#8212;</span>'; }

function renderRows(){
  document.getElementById("course-rows").innerHTML = COURSES.map((c,i)=>{
    const [label,color]=REC[c.recommendation]||[c.recommendation,"#718096"];
    return `<tr onclick="openCourse(${i})">
      <td><span class="ccode">${esc(c.code)}</span></td>
      <td class="cname">${esc(c.name)}</td>
      <td class="center">${c.year != null ? c.year : ''}</td>
      <td><span class="badge" style="background:${color}">${esc(label)}</span></td>
      <td class="score-cell" style="color:${recColor(c.recommendation)}">${c.score.toFixed(2)}</td>
    </tr>`;
  }).join("");
}

function openCourse(i){
  const c=COURSES[i];
  const [label,color]=REC[c.recommendation]||[c.recommendation,"#718096"];
  const units = c.vet_units.length
    ? c.vet_units.map(u=>`<li><span class="ucode">${esc(u[0])}</span>${u[1] ? ' - ' + esc(u[1]) : ''}</li>`).join("")
    : "<li>No mapped source courses</li>";
  const DASH = '<span class="no">&#8212;</span>';
  const rows = c.matches.length
    ? c.matches.map(m=>{
        const mapped = !!m[0];
        // m: [vet_skill, uni_skill, raw_sim, level_ok, ctx_ok, vet_unit, combined]
        const sim = mapped
          ? `<span class="bar"><span style="width:${Math.round(m[2]*100)}%"></span></span><span class="simval">${Math.round(m[2]*100)}%</span>`
          : DASH;
        const combined = mapped
          ? `<span class="simval">${Math.round(m[6]*100)}%</span>`
          : DASH;
        return `<tr>
          <td><span class="ucode">${mapped ? esc(m[5]) : DASH}</span></td>
          <td>${mapped ? esc(m[0]) : DASH}</td>
          <td>${esc(m[1])}</td>
          <td>${combined}</td>
          <td>${sim}</td>
          <td class="center">${mapped ? check(m[3]) : DASH}</td>
          <td class="center">${mapped ? check(m[4]) : DASH}</td>
        </tr>`;
      }).join("")
    : '<tr><td colspan="7" class="center">No skill matches</td></tr>';
  document.getElementById("detail-content").innerHTML = `
    <div class="d-head">
      <h2>${esc(c.code)} - ${esc(c.name)}${c.year != null ? ` <span style="color:var(--text-dim);font-size:0.7em;font-weight:500;">(Year ${c.year})</span>` : ''}</h2>
      <span class="badge" style="background:${color}">${esc(label)}</span>
    </div>
    <div class="top">
      <div class="pnl summary">
        <p class="pnl-title">Alignment Summary</p>
        <ul>
          <li>Skill Coverage: <b>${pct(c.coverage.overall)}</b></li>
          <li>Match Quality: <b>${pct(c.coverage.quality)}</b></li>
          <li>Level Alignment: <b>${pct(c.coverage.level)}</b></li>
          <li>Context Alignment: <b>${pct(c.coverage.context)}</b></li>
          <li>Exact Matches: <b>${c.exact}</b></li>
        </ul>
      </div>
      <div class="pnl units">
        <p class="pnl-title">Mapped Source Courses</p>
        <ul>${units}</ul>
      </div>
      <div class="gauge-wrap">${gauge(c.score, c.confidence, c.recommendation)}</div>
    </div>
    <div class="matches">
      <h3>Skill-to-skill matches</h3>
      <table class="match">
        <thead><tr><th>Source Course</th><th>Source Skill</th><th>Target Skill</th><th>Combined</th><th>Similarity</th><th class="center">Level</th><th class="center">Context</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="footnote">Combined is the weighted score (similarity, level, and context). Similarity is the skill-name semantic cosine only.</p>`;
  showTab("detail");
}
renderRows();
</script>
</body>
</html>
